

services:
  postgres:
    image: postgres:14-alpine
    container_name: postgres
    ports:
      - "5432:5432"
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-qualeider}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - qualeider-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: qualeider-backend
    restart: on-failure
    depends_on:
      - postgres
    environment:
      DATABASE_URL: "postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-qualeider}?schema=public"
      JWT_SECRET: ${JWT_SECRET:-secret}
      PORT: 3000
    volumes:
      - ./backend:/usr/appBackend
      - /usr/appBackend/dist
      - /usr/appBackend/node_modules
    networks:
      - qualeider-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: qualeider-frontend
    restart: on-failure
    environment:
      NEXT_PUBLIC_API_URL: /api 
    networks:
      - qualeider-network

  nginx:
    image: nginx:alpine
    container_name: qualeider-nginx
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend
    networks:
      - qualeider-network

volumes:
  pgdata:
    driver: local

networks:
  qualeider-network:
    driver: bridge
