# =============================================================================
# docker-compose.prod.yml — Qualeider Production
# =============================================================================
# Arquivo para deploy em produção usando imagens pré-publicadas no GHCR.
#
# Uso:
#   1. Copie este arquivo e o .env para o servidor
#   2. Faça login no GHCR:
#      echo $CR_PAT | docker login ghcr.io -u <USERNAME> --password-stdin
#   3. Suba os serviços:
#      docker compose -f docker-compose.prod.yml up -d
#
# Variáveis necessárias no .env:
#   GHCR_OWNER      → owner das imagens no GHCR (ex: ifpebj-ti)
#   BACKEND_TAG     → tag da imagem backend (ex: 1.2.0 ou latest)
#   FRONTEND_TAG    → tag da imagem frontend (ex: 1.2.0 ou latest)
#   POSTGRES_USER, POSTGRES_PASSWORD, POSTGRES_DB
#   JWT_SECRET, JWT_EXPIRATION
#   CORS_ORIGINS, SMTP_*, REDIS_PASSWORD
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # PostgreSQL
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:14-alpine
    container_name: qualeider-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-qualeider}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - qualeider-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # Redis
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: qualeider-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
    networks:
      - qualeider-network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # Backend — imagem GHCR (multi-arch AMD64 + ARM64)
  # ---------------------------------------------------------------------------
  backend:
    image: ghcr.io/${GHCR_OWNER:-jardimdesoftware}/qualeider-backend:${BACKEND_TAG:-latest}
    container_name: qualeider-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: "postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-qualeider}?schema=public"
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-24h}
      PORT: 3000
      NODE_ENV: production
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3001}
      SMTP_HOST: ${SMTP_HOST:-smtp.gmail.com}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      SMTP_FROM: ${SMTP_FROM:-noreply@qualeider.com}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      REDIS_DB: 0
    networks:
      - qualeider-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ---------------------------------------------------------------------------
  # Frontend — imagem GHCR (multi-arch AMD64 + ARM64)
  # ---------------------------------------------------------------------------
  frontend:
    image: ghcr.io/${GHCR_OWNER:-jardimdesoftware}/qualeider-frontend:${FRONTEND_TAG:-latest}
    container_name: qualeider-frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: /api
    networks:
      - qualeider-network
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3000 || exit 0"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ---------------------------------------------------------------------------
  # Nginx — Reverse Proxy
  # ---------------------------------------------------------------------------
  nginx:
    image: nginx:alpine
    container_name: qualeider-nginx
    restart: unless-stopped
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      frontend:
        condition: service_healthy
      backend:
        condition: service_healthy
    networks:
      - qualeider-network
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://localhost:80/ || exit 0"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  pgdata:
    driver: local
  redis_data:
    driver: local

networks:
  qualeider-network:
    driver: bridge
