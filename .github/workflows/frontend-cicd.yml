# =============================================================================
# Frontend CI/CD — Qualeider
# =============================================================================
# Arquitetura de jobs:
# ┌──────────────┐
# │ tag-creation │
# └──────┬───────┘
#        │
# ┌──────▼──────────────────────┐
# │  frontend-docker            │  ← buildx multi-arch AMD64 + ARM64 → GHCR
# │  (lint + build + trivy)     │    Trivy: apenas reporta, não bloqueia
# └──────┬──────────────────────┘
#        │
# ┌──────▼──────────┐
# │release-creation  │
# └─────────────────┘
# =============================================================================

name: Frontend CI/CD

on:
  pull_request:
    branches:
      - main
    types:
      - closed
    paths:
      - "frontend/**"
      - ".github/workflows/frontend-cicd.yml"

  workflow_dispatch:

# ---------------------------------------------------------------------------
# Permissões globais mínimas
# ---------------------------------------------------------------------------
permissions:
  contents: read

# Cancelar execuções anteriores na mesma branch/PR
concurrency:
  group: frontend-ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/qualeider-frontend

jobs:
  # --------------------------------------------------------------------
  # 0) TAG CREATION
  # --------------------------------------------------------------------
  tag-creation:
    name: 0. Automatic Creation Process of New Tags
    runs-on: ubuntu-latest
    if: github.event.pull_request.merged == true || github.event_name == 'workflow_dispatch'
    permissions:
      contents: write
    outputs:
      created_tag: ${{ steps.created_tag.outputs.created_tag }}
      change_type: ${{ steps.change_type.outputs.change_type }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install GitHub CLI
        run: sudo apt-get install -y gh

      - name: Write PR body and log context
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          echo "Event: ${{ github.event_name }}"
          echo "PR merged: ${{ github.event.pull_request.merged }}"
          printf '%s' "$PR_BODY" > body.txt
          echo "--- PR body ---"
          cat body.txt
          echo "--- end ---"

      - name: Extract type of change from PR
        id: change_type
        if: github.event.pull_request.merged == true
        run: |
          change_type=""
          if grep -qiE "\[x\]\s*\`?novo-marco\`?" body.txt; then
            change_type="novo-marco"
          elif grep -qiE "\[x\]\s*\`?nova-feature-refactor\`?" body.txt; then
            change_type="nova-feature-refactor"
          elif grep -qiE "\[x\]\s*\`?bug-fix\`?" body.txt; then
            change_type="bug-fix"
          elif grep -qiE "\[x\]\s*\`?outros\`?" body.txt; then
            change_type="outros"
          else
            echo "Nenhuma opção marcada corretamente no corpo do PR. Conteúdo:"
            cat body.txt
            exit 1
          fi

          echo "Tipo detectado: $change_type"
          echo "change_type=$change_type" >> "$GITHUB_OUTPUT"

      - name: Get the last release tag
        id: last_tag
        run: |
          gh auth setup-git
          tag=$(gh release list --limit 1 --json tagName --jq '.[0].tagName' 2>/dev/null || echo "")
          if [[ -z "$tag" ]]; then tag="0.0.0"; fi
          echo "last_tag=$tag" >> "$GITHUB_OUTPUT"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Calculate new tag
        id: created_tag
        run: |
          IFS='.' read -r major minor patch <<< "${{ steps.last_tag.outputs.last_tag }}"
          case "${{ steps.change_type.outputs.change_type }}" in
            bug-fix)
              patch=$((patch + 1))
              ;;
            nova-feature-refactor)
              minor=$((minor + 1))
              patch=0
              ;;
            novo-marco)
              major=$((major + 1))
              minor=0
              patch=0
              ;;
            outros)
              # Mantém a tag atual
              ;;
          esac

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            created_tag="dev-${GITHUB_SHA::7}"
          else
            created_tag="${major}.${minor}.${patch}"
          fi

          echo "Nova tag: $created_tag"
          echo "created_tag=$created_tag" >> "$GITHUB_OUTPUT"

  # --------------------------------------------------------------------
  # 1) FRONTEND BUILD MULTI-ARCH & PUBLISH → GHCR
  # --------------------------------------------------------------------
  frontend-docker:
    name: 1. Frontend CI/CD — Build & Publish Multi-arch
    runs-on: ubuntu-latest
    timeout-minutes: 40
    needs: tag-creation
    if: >
      (github.event.pull_request.merged == true || github.event_name == 'workflow_dispatch')
    permissions:
      contents: read
      packages: write
      security-events: write
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run Lint
        run: npm run lint

      # --- Trivy FS Scan (apenas reporta, não bloqueia) ---
      - name: Trivy — Filesystem Scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: "fs"
          scan-ref: "frontend"
          format: "table"
          exit-code: "0"            # ← Não bloqueia o pipeline
          severity: "CRITICAL,HIGH"
          ignore-unfixed: true

      # --- Trivy SARIF para GitHub Security tab ---
      - name: Trivy — SARIF Report
        if: always()
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: "fs"
          scan-ref: "frontend"
          format: "sarif"
          output: "trivy-frontend-fs.sarif"
          severity: "CRITICAL,HIGH,MEDIUM"

      - name: Upload Trivy SARIF to GitHub Security
        if: always()
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: "trivy-frontend-fs.sarif"
          category: "trivy-frontend-fs"

      # --- Docker Setup (QEMU para emulação ARM64) ---
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # --- Build & Push Multi-arch (AMD64 + ARM64) ---
      - name: Build and Push Multi-arch Docker image
        id: push
        uses: docker/build-push-action@v6
        with:
          context: frontend
          file: frontend/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            NEXT_PUBLIC_API_URL=/api
            NEXT_PUBLIC_APP_VERSION=${{ needs.tag-creation.outputs.created_tag }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.tag-creation.outputs.created_tag }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          labels: |
            org.opencontainers.image.title=Qualeider Frontend
            org.opencontainers.image.description=Frontend Next.js for Qualeider platform
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ needs.tag-creation.outputs.created_tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # --- Trivy Image Scan (apenas reporta, não bloqueia) ---
      - name: Trivy — Docker Image Scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.tag-creation.outputs.created_tag }}"
          format: "table"
          exit-code: "0"            # ← Não bloqueia o pipeline
          severity: "CRITICAL,HIGH"
          ignore-unfixed: true

      # --- Trivy Image SARIF ---
      - name: Trivy — Image SARIF Report
        if: always()
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.tag-creation.outputs.created_tag }}"
          format: "sarif"
          output: "trivy-frontend-image.sarif"
          severity: "CRITICAL,HIGH,MEDIUM"

      - name: Upload Image SARIF to GitHub Security
        if: always()
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: "trivy-frontend-image.sarif"
          category: "trivy-frontend-image"

  # --------------------------------------------------------------------
  # 2) RELEASE CREATION
  # --------------------------------------------------------------------
  release-creation:
    name: 2. Automatic Creation Process of New Releases
    runs-on: ubuntu-latest
    needs: [tag-creation, frontend-docker]
    if: needs.frontend-docker.result == 'success'
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Release Publication
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.tag-creation.outputs.created_tag }}
          name: Release ${{ needs.tag-creation.outputs.created_tag }}
          generate_release_notes: true
          body: |
            ## 🚀 Release ${{ needs.tag-creation.outputs.created_tag }}

            **Frontend Image**: `${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.tag-creation.outputs.created_tag }}`

            ### Arquiteturas suportadas
            - ✅ `linux/amd64` (x86_64)
            - ✅ `linux/arm64` (ARM64 / OCI Free Tier / Apple Silicon)

            ### Pull da imagem
            ```bash
            docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.tag-creation.outputs.created_tag }}
            ```

            ---
            Release automatically generated from PR #${{ github.event.pull_request.number }}
