# =============================================================================
# Backend CI/CD — Qualeider
# =============================================================================
# Workflow unificado de CI/CD para o backend.
#
# Arquitetura de jobs:
# ┌──────────┐  ┌─────────────┐  ┌───────────────────┐  ┌───────────────┐
# │   lint   │  │ unit-tests  │  │ integration-tests │  │   e2e-tests   │
# └────┬─────┘  └──────┬──────┘  └────────┬──────────┘  └──────┬────────┘
#      │               │                  │                    │
#      └───────────────┴──────────────────┴────────────────────┘
#                                    │
#                           ┌────────▼──────────────┐
#                           │  build-and-publish     │  ← buildx multi-arch
#                           │  (apenas na main)      │    AMD64 + ARM64 → GHCR
#                           └────────┬──────────────┘
#                                    │
#                           ┌────────▼────────┐
#                           │release-creation  │
#                           └─────────────────┘
# =============================================================================

name: Backend CI/CD

on:
  push:
    branches: [main, develop]
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci.yml"

  pull_request:
    branches: [main, develop]
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci.yml"
    types:
      - closed

  workflow_dispatch:
    inputs:
      change_type:
        description: 'Tipo de mudança (novo-marco, nova-feature-refactor, bug-fix, outros)'
        required: true
        default: 'bug-fix'
        type: choice
        options:
          - novo-marco
          - nova-feature-refactor
          - bug-fix
          - outros

# ---------------------------------------------------------------------------
# Permissões globais mínimas (Principle of Least Privilege)
# ---------------------------------------------------------------------------
permissions:
  contents: read

# Cancelar execuções anteriores na mesma branch/PR
concurrency:
  group: backend-ci-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

# ---------------------------------------------------------------------------
# Variáveis de ambiente reutilizadas
# ---------------------------------------------------------------------------
env:
  NODE_VERSION: "20"
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/qualeider-backend

jobs:
  # =========================================================================
  # 0) TAG CREATION
  # =========================================================================
  tag-creation:
    name: 0. Automatic Creation Process of New Tags
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'pull_request' && github.event.pull_request.merged == true && github.event.pull_request.base.ref == 'main')
    permissions:
      contents: write
    outputs:
      created_tag: ${{ steps.created_tag.outputs.created_tag }}
      change_type: ${{ steps.change_type.outputs.change_type }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install GitHub CLI
        run: sudo apt-get install -y gh

      - name: Write PR body and log context
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          echo "Event: ${{ github.event_name }}"
          echo "PR merged: ${{ github.event.pull_request.merged }}"
          printf '%s' "$PR_BODY" > body.txt
          echo "--- PR body ---"
          cat body.txt
          echo "--- end ---"

      - name: Extract type of change from PR
        id: change_type
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "change_type=${{ inputs.change_type }}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          change_type=""
          if grep -qiE "\[x\]\s*\`?novo-marco\`?" body.txt; then
            change_type="novo-marco"
          elif grep -qiE "\[x\]\s*\`?nova-feature-refactor\`?" body.txt; then
            change_type="nova-feature-refactor"
          elif grep -qiE "\[x\]\s*\`?bug-fix\`?" body.txt; then
            change_type="bug-fix"
          elif grep -qiE "\[x\]\s*\`?outros\`?" body.txt; then
            change_type="outros"
          else
            echo "Nenhuma opção marcada corretamente no corpo do PR. Conteúdo:"
            cat body.txt
            exit 1
          fi

          echo "Tipo detectado: $change_type"
          echo "change_type=$change_type" >> "$GITHUB_OUTPUT"

      - name: Get the last release tag
        id: last_tag
        run: |
          gh auth setup-git
          tag=$(gh release list --limit 1 --json tagName --jq '.[0].tagName' 2>/dev/null || echo "")
          if [[ -z "$tag" ]]; then tag="0.0.0"; fi
          echo "last_tag=$tag" >> "$GITHUB_OUTPUT"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Calculate new tag
        id: created_tag
        run: |
          last_tag_raw="${{ steps.last_tag.outputs.last_tag }}"
          # Remove o prefixo 'v' se existir para evitar erros de aritmética no bash
          last_tag_clean="${last_tag_raw#v}"
          if [[ -z "$last_tag_clean" || "$last_tag_clean" == "0.0.0" ]]; then
            last_tag_clean="0.0.0"
          fi

          IFS='.' read -r major minor patch <<< "$last_tag_clean"

          # Garantir que os componentes extraídos sejam numéricos
          if ! [[ "$major" =~ ^[0-9]+$ ]]; then major=0; fi
          if ! [[ "$minor" =~ ^[0-9]+$ ]]; then minor=0; fi
          if ! [[ "$patch" =~ ^[0-9]+$ ]]; then patch=0; fi

          case "${{ steps.change_type.outputs.change_type }}" in
            bug-fix)
              patch=$((patch + 1))
              ;;
            nova-feature-refactor)
              minor=$((minor + 1))
              patch=0
              ;;
            novo-marco)
              major=$((major + 1))
              minor=0
              patch=0
              ;;
            outros)
              # Mantém a tag atual
              ;;
          esac
          created_tag="v${major}.${minor}.${patch}"
          echo "Nova tag: $created_tag"
          echo "created_tag=$created_tag" >> "$GITHUB_OUTPUT"

  # =========================================================================
  # 1) LINT
  # =========================================================================
  lint:
    name: 🔍 Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci
        env:
          HUSKY: "0"

      - name: Run ESLint
        run: npm run lint

  # =========================================================================
  # 2) UNIT TESTS
  # =========================================================================
  unit-tests:
    name: 🧪 Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci
        env:
          HUSKY: "0"

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Run Unit Tests with Coverage
        run: npm run test:unit -- --coverage --ci

      - name: Upload Unit Test Coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-unit
          path: backend/coverage/unit/
          retention-days: 7

  # =========================================================================
  # 3) INTEGRATION TESTS
  # =========================================================================
  integration-tests:
    name: 🔗 Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: qualeider_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci
        env:
          HUSKY: "0"

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Push database schema
        run: npx prisma db push --accept-data-loss
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/qualeider_test

      - name: Run Integration Tests
        run: npm run test:integration -- --ci --passWithNoTests
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/qualeider_test
          NODE_ENV: test
          JWT_SECRET: test-secret-key-for-ci
          JWT_EXPIRATION: 24h

      - name: Upload Integration Test Coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-integration
          path: backend/coverage/integration/
          retention-days: 7

  # =========================================================================
  # 4) E2E TESTS
  # =========================================================================
  e2e-tests:
    name: 🌐 E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: qualeider_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci
        env:
          HUSKY: "0"

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Push database schema
        run: npx prisma db push --accept-data-loss
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/qualeider_test

      - name: Run E2E Tests
        run: npm run test:e2e -- --ci
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/qualeider_test
          NODE_ENV: test
          JWT_SECRET: test-secret-key-for-ci
          JWT_EXPIRATION: 24h
          MAIL_HOST: localhost
          MAIL_PORT: 1025
          MAIL_USER: ""
          MAIL_PASSWORD: ""
          MAIL_FROM: noreply@qualeider.test

      - name: Upload E2E Test Coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-e2e
          path: backend/coverage/e2e/
          retention-days: 7

  # =========================================================================
  # 5) SECURITY SCAN (Trivy FS — apenas reporta, não bloqueia)
  # =========================================================================
  security-scan:
    name: 🛡️ Security Scan
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # --- Trivy Filesystem Scan (dependências + vulnerabilidades) ---
      - name: Trivy — Filesystem Scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: "fs"
          scan-ref: "backend"
          format: "table"
          exit-code: "0"            # ← Não bloqueia o pipeline
          severity: "CRITICAL,HIGH"
          ignore-unfixed: true
          trivyignores: "backend/.trivyignore"

      # --- Trivy Secrets Scan ---
      - name: Trivy — Secrets Scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: "fs"
          scan-ref: "backend"
          scanners: "secret"
          format: "table"
          exit-code: "0"            # ← Não bloqueia o pipeline

      # --- Trivy Config Scan (Dockerfile, CI configs) ---
      - name: Trivy — Config Scan (Dockerfile & CI)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: "config"
          scan-ref: "."
          format: "table"
          exit-code: "0"
          severity: "CRITICAL,HIGH,MEDIUM"
          trivyignores: "backend/.trivyignore"

      # --- Trivy SARIF para GitHub Security tab ---
      - name: Trivy — SARIF Report
        if: always()
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: "fs"
          scan-ref: "backend"
          format: "sarif"
          output: "trivy-results.sarif"
          severity: "CRITICAL,HIGH,MEDIUM"

      - name: Upload Trivy SARIF to GitHub Security
        if: always()
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: "trivy-results.sarif"
          category: "trivy-fs"

  # =========================================================================
  # 1) BACKEND BUILD MULTI-ARCH & PUBLISH → GHCR (apenas na main)
  # =========================================================================
  build-and-publish:
    name: 1. Backend CI/CD
    runs-on: ubuntu-latest
    timeout-minutes: 40
    needs: [tag-creation, lint, unit-tests, integration-tests, e2e-tests, security-scan]
    if: >
      always() &&
      needs.lint.result == 'success' &&
      needs.unit-tests.result == 'success' &&
      needs.integration-tests.result == 'success' &&
      needs.e2e-tests.result == 'success' &&
      (
        (github.ref == 'refs/heads/main' && github.event_name == 'push') ||
        (github.event_name == 'workflow_dispatch') ||
        (github.event_name == 'pull_request' && github.event.pull_request.merged == true && github.event.pull_request.base.ref == 'main')
      )
    permissions:
      contents: read
      packages: write
      security-events: write
      id-token: write   # Necessário para Cosign keyless signing
    outputs:
      image-digest: ${{ steps.push.outputs.digest }}
      image-tag: ${{ steps.resolve_tag.outputs.image_tag }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # --- Resolver a tag da imagem ---
      - name: Resolve image tag
        id: resolve_tag
        run: |
          if [[ -n "${{ needs.tag-creation.outputs.created_tag }}" ]]; then
            image_tag="${{ needs.tag-creation.outputs.created_tag }}"
          else
            image_tag="dev-${GITHUB_SHA::7}"
          fi
          echo "image_tag=$image_tag" >> "$GITHUB_OUTPUT"
          echo "📦 Image tag: $image_tag"

      # --- Docker Setup (QEMU para emulação ARM64) ---
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # --- Build & Push Multi-arch (AMD64 + ARM64) ---
      - name: Build and Push Multi-arch Docker image
        id: push
        uses: docker/build-push-action@v7
        with:
          context: backend
          file: backend/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.resolve_tag.outputs.image_tag }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          labels: |
            org.opencontainers.image.title=Qualeider Backend
            org.opencontainers.image.description=Backend API for Qualeider platform
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ steps.resolve_tag.outputs.image_tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # --- Trivy Image Scan (apenas reporta, não bloqueia) ---
      - name: Trivy — Docker Image Scan
        if: steps.push.outcome == 'success'
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.resolve_tag.outputs.image_tag }}"
          format: "table"
          exit-code: "0"            # ← Não bloqueia o pipeline
          severity: "CRITICAL,HIGH"
          ignore-unfixed: true
          trivyignores: "backend/.trivyignore"
        env:
          TRIVY_USERNAME: ${{ github.actor }}
          TRIVY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}

      # --- Trivy Image SARIF ---
      - name: Trivy — Image SARIF Report
        if: steps.push.outcome == 'success'
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.resolve_tag.outputs.image_tag }}"
          format: "sarif"
          output: "trivy-image.sarif"
          severity: "CRITICAL,HIGH,MEDIUM"
        env:
          TRIVY_USERNAME: ${{ github.actor }}
          TRIVY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Image SARIF to GitHub Security
        if: steps.push.outcome == 'success'
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: "trivy-image.sarif"
          category: "trivy-image"

      # --- SBOM Generation (CycloneDX) ---
      - name: Trivy — Generate SBOM (CycloneDX)
        if: steps.push.outcome == 'success'
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.resolve_tag.outputs.image_tag }}"
          format: "cyclonedx"
          output: "sbom.cdx.json"
        env:
          TRIVY_USERNAME: ${{ github.actor }}
          TRIVY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload SBOM
        if: steps.push.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: sbom-cyclonedx
          path: sbom.cdx.json
          retention-days: 90

      # --- Cosign Keyless Signing (Sigstore/Fulcio OIDC) ---
      - name: Install Cosign
        if: steps.push.outcome == 'success'
        uses: sigstore/cosign-installer@v3

      - name: Sign image with Cosign (keyless)
        if: steps.push.outcome == 'success'
        run: |
          cosign sign --yes \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.push.outputs.digest }}
        env:
          COSIGN_EXPERIMENTAL: "1"

  # =========================================================================
  # 3) RELEASE CREATION
  # =========================================================================
  release-creation:
    name: 3. Automatic Creation Process of New Releases
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [tag-creation, build-and-publish]
    if: >
      needs.build-and-publish.result == 'success' &&
      needs.tag-creation.result == 'success' &&
      (
        (github.ref == 'refs/heads/main' && github.event_name == 'push') ||
        (github.event_name == 'workflow_dispatch') ||
        (github.event_name == 'pull_request' && github.event.pull_request.merged == true && github.event.pull_request.base.ref == 'main')
      )
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download SBOM
        uses: actions/download-artifact@v4
        with:
          name: sbom-cyclonedx

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.tag-creation.outputs.created_tag }}
          name: Release ${{ needs.tag-creation.outputs.created_tag }}
          generate_release_notes: true
          files: |
            sbom.cdx.json
          body: |
            ## 🚀 Release ${{ needs.tag-creation.outputs.created_tag }}

            **Backend Image**: `${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.tag-creation.outputs.created_tag }}`

            ### Arquiteturas suportadas
            - ✅ `linux/amd64` (x86_64)
            - ✅ `linux/arm64` (ARM64 / OCI Free Tier / Apple Silicon)

            ### Pull da imagem
            ```bash
            docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.tag-creation.outputs.created_tag }}
            ```

            ### Security
            - 🛡️ Trivy vulnerability scan executado (resultado na aba Security)
            - ✅ Image signed with Cosign (keyless/Sigstore)
            - 📦 SBOM (CycloneDX) attached

            ---
            *Automatically generated from commit ${{ github.sha }}*
