# =============================================================================
# CodeQL — Static Application Security Testing (SAST)
# =============================================================================
# Analisa código JavaScript/TypeScript para vulnerabilidades de segurança
# Resultados aparecem na aba "Security" → "Code scanning alerts" do repositório
# =============================================================================

name: CodeQL SAST

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    # Roda semanalmente às segundas 06:00 UTC para detectar novas advisories
    - cron: "0 6 * * 1"

permissions:
  contents: read

concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: 🔬 CodeQL Analysis
    runs-on: ubuntu-latest
    timeout-minutes: 20
    continue-on-error: true
    permissions:
      contents: read
      security-events: write
      actions: read  # Required for private repos

    strategy:
      fail-fast: false
      matrix:
        language: ["javascript-typescript"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          # Usar queries estendidas para maior cobertura de segurança
          queries: security-extended

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"
